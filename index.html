<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPTU - Marcha del Silencio</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 15px; background-color: #f4f4f4; }
        .header { background: #004a99; color: white; padding: 15px; text-align: center; font-weight: bold; margin: -15px -15px 15px -15px; }
        .info-corte { background: #fff3cd; border: 1px solid #ffeeba; padding: 10px; border-radius: 5px; margin-bottom: 15px; font-size: 0.9em; }
        .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        label { display: block; font-weight: bold; margin-bottom: 10px; color: #004a99; }
        select { width: 100%; padding: 12px; font-size: 16px; border: 2px solid #004a99; border-radius: 5px; }
        .resultado { display: none; margin-top: 20px; line-height: 1.6; }
        .titulo-res { font-weight: bold; color: #d9534f; display: block; margin-bottom: 10px; border-bottom: 1px solid #eee; }
        .paradas { margin-top: 15px; font-size: 0.9em; background: #eef6ff; padding: 10px; border-radius: 5px; border-left: 4px solid #004a99; }
    </style>
</head>
<body>

<div class="header">INTENDENCIA DE MONTEVIDEO - UPTU</div>

<div class="info-corte">
    <strong>OPERATIVO 20 DE MAYO:</strong><br>
    - 17:00: Corte 18 de Julio (B. Amorín - Río Negro).<br>
    - 18:00: Corte TOTAL y Jackson esq. Guayabos.<br>
    - 19:00: Partida de la Marcha.
</div>

<div class="card">
    <label>SELECCIONE LÍNEA O DESTINO:</label>
    <select id="lineaSelect" onchange="mostrarDesvio()">
        <option value="">-- Buscar desvío --</option>
        <option value="centro8">100, 102, 103, 105, 109, 110, 113, D8 (al Centro)</option>
        <option value="cvieja">21, 180, 187, 188, D9, D10, CE1 (a C. Vieja)</option>
        <option value="afuera8">Líneas hacia afuera (por 8 de Octubre)</option>
        <option value="afueraIt">Líneas hacia afuera (por Av. Italia)</option>
        <option value="afueraRi">Líneas hacia afuera (por Av. Rivera)</option>
        <option value="60centro">60, 62, 142, G, D11 (al Centro)</option>
        <option value="149leyes">149, 522 (hacia P. Legislativo)</option>
        <option value="149pocitos">149, 522 (hacia Pocitos)</option>
        <option value="128">128, 199 (Pocitos / Pta. Carretas)</option>
        <option value="17">17, 137, 409, 582 (al Centro/Afuera)</option>
        <option value="104">104, 117 (Jackson / Afuera)</option>
    </select>

    <div id="resultado" class="resultado">
        <span id="resNombre" class="titulo-res"></span>
        <div id="resRuta"></div>
        <div class="paradas">
            <strong>PARADAS PROVISORIAS:</strong><br>
            <span id="resParadas"></span>
        </div>
    </div>
</div>

<script>
const desvios = {
    "centro8": {
        n: "Líneas 100, 102, 103, 105, 109, 110, 113, D8 (al Centro)",
        r: "Túnel de Av. 8 de Octubre, Colonia, Fernández Crespo, Av. Uruguay a ruta.",
        p: "Uruguay y T. Narvaja, Uruguay y Magallanes, Uruguay y Minas, Uruguay y Tacuarembó."
    },
    "cvieja": {
        n: "Líneas 21, 180, 187, 188, D9, D10, CE1 (a C. Vieja)",
        r: "18 de Julio, Beisso, Colonia, Fernández Crespo, Av. Uruguay a ruta.",
        p: "Uruguay y Barrios Amorín, Uruguay y Ejido, Uruguay y Yi, Uruguay y Rondeau."
    },
    "afuera8": {
        n: "Líneas por 18 de Julio (hacia 8 de Octubre)",
        r: "San José, Río Branco, Mercedes, M. C. Martínez/Juan Paullier, Av. 18 de Julio a ruta.",
        p: "Mercedes y Uruguay, San José y Michelini, San José y A. Lanza."
    },
    "afueraIt": {
        n: "Líneas por 18 de Julio (hacia Av. Italia)",
        r: "San José, A. Lanza, Maldonado, B. Amorín, Constituyente, Pablo de María, 18 de Julio a ruta.",
        p: "Constituyente y Minas, Rodó y Magallanes, Rodó y Acevedo."
    },
    "afueraRi": {
        n: "Líneas por 18 de Julio (hacia Av. Rivera)",
        r: "San José, A. Lanza, Maldonado, B. Amorín, Constituyente, J. E. Rodó a ruta.",
        p: "San José y A. Lanza, J. E. Rodó y Magallanes."
    },
    "60centro": {
        n: "60, 62, 142, G, D11 (al Centro)",
        r: "Rivera, J. Requena, Colonia, J. H. y Obes, Av. 18 de Julio a ruta.",
        p: "Colonia y Cuareim, Colonia y Rondeau, Colonia y Paraguay."
    },
    "149leyes": {
        n: "149, 522 (hacia P. Legislativo)",
        r: "Ejido, Soriano, Paraguay, Mercedes, Ejido a ruta.",
        p: "Ejido y Colonia, Paraguay y Mercedes."
    },
    "149pocitos": {
        n: "149, 522 (hacia Pocitos)",
        r: "Yaguarón, Av. Uruguay, Libertador, Río Negro, Maldonado, Aquiles Lanza a ruta.",
        p: "Yaguarón y 18 de Julio, Maldonado y Aquiles Lanza."
    },
    "128": {
        n: "128, 199 (Pocitos / Pta. Carretas)",
        r: "Arenal Grande, E. Victor Haedo, J. Paullier, Maldonado, E. Acevedo a ruta.",
        p: "Arenal Grande y Colonia, Guayabos y Gaboto."
    },
    "17": {
        n: "17, 137, 409, 582",
        r: "Minas, Rodó, Requena, Colonia a ruta.",
        p: "Minas y Colonia, Magallanes y 18 de Julio."
    },
    "104": {
        n: "104, 117 (Jackson / Afuera)",
        r: "Jackson, Constituyente, Canelones, Wilson Ferreira Aldunate. Afuera: 18 de Julio, Río Negro, San José, A. Lanza, Maldonado, E. Acevedo a ruta.",
        p: "San José y Zelmar Michelini, San José y Aquiles Lanza."
    }
};

function mostrarDesvio() {
    const val = document.getElementById("lineaSelect").value;
    const res = document.getElementById("resultado");
    if (val) {
        res.style.display = "block";
        document.getElementById("resNombre").innerText = desvios[val].n;
        document.getElementById("resRuta").innerText = desvios[val].r;
        document.getElementById("resParadas").innerText = desvios[val].p;
    } else {
        res.style.display = "none";
    }
}
</script>
</body>
</html>
